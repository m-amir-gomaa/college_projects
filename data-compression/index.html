<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Web Page Text Compressor | PRO Pipeline</title>
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #161e2e;
            --surface-light: #1f2937;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.01em; color: var(--accent); }

        .pipeline-status {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-dim);
            cursor: pointer;
        }

        main {
            display: grid;
            grid-template-columns: 350px 6px 1fr; /* Reduced editor width, expanded sidebar */
            flex: 1;
            overflow: hidden;
        }

        #main-splitter {
            background: #1e293b;
            cursor: col-resize;
            transition: background 0.2s;
            z-index: 20;
        }

        #main-splitter:hover { background: var(--accent); }
        #main-splitter.dragging { background: var(--accent); width: 8px; }

        .editor-container {
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1rem;
            background: #000;
            min-width: 200px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: 1px solid #2d3748;
            color: var(--success);
            font-family: 'Fira Code', 'Courier New', monospace;
            padding: 1.5rem;
            border-radius: 0.75rem;
            resize: none;
            outline: none;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .sidebar {
            background: #0d1117;
            padding: 1rem;
            overflow-y: hidden; 
            border-left: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .resizer-v {
            height: 2px;
            background: rgba(255, 255, 255, 0.03);
            cursor: row-resize;
            margin: 8px 0;
            flex-shrink: 0;
            position: relative;
            transition: all 0.2s;
        }

        .resizer-v:hover, .resizer-v.dragging { 
            background: var(--accent); 
            height: 4px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            min-height: 60px;
            flex-shrink: 0;
            overflow: hidden;
            /* Transition removed from here to prevent dragging lag */
        }

        .sidebar-section.animating {
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-section.collapsed {
            height: 32px !important;
            min-height: 32px !important;
            margin-bottom: 8px;
        }

        .sidebar-section.collapsed .viz-box,
        .sidebar-section.collapsed .stat-card,
        .sidebar-section.collapsed .stat-sub,
        .sidebar-section.collapsed #dict-controls,
        .sidebar-section.collapsed .progress-indicator,
        .sidebar-section.collapsed > div:not(.stat-label):not(.stat-group) {
            display: none !important;
        }

        /* If the whole stat-group is inside a collapsed section */
        .sidebar-section.collapsed .stat-group { display: none !important; }

        /* Hide the resizer after a collapsed section */
        .sidebar-section.collapsed + .resizer-v {
            display: none !important;
        }

        .stat-card, .viz-box {
            flex: 1;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            padding: 1.25rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Custom Scrollbar */
        .stat-card::-webkit-scrollbar, .viz-box::-webkit-scrollbar { width: 4px; }
        .stat-card::-webkit-scrollbar-thumb, .viz-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }

        .stat-label { 
            color: var(--text-dim); 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            margin-bottom: 0.5rem; 
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            user-select: none;
        }

        .stat-label:hover { color: var(--accent); }
        .stat-label::after { content: '▼'; font-size: 0.5rem; transition: transform 0.3s; }
        .stat-label.collapsed::after { transform: rotate(-90deg); }

        .dict-entry {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.25rem 0;
            border-bottom: 1px solid #1f2937;
        }

        .dict-key { color: var(--accent); }
        .dict-val { color: var(--text-dim); }

        .progress-indicator {
            height: 4px;
            background: #1f2937;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        button {
            background: var(--surface-light);
            border: 1px solid #374151;
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        button:hover { background: var(--accent); color: var(--bg); }
        button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .step-info {
            background: var(--accent-glow);
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            border-left: 3px solid var(--accent);
            margin-top: 1rem;
        }

        #huffman-tree-svg {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 0.5rem;
        }

        .node-circle { fill: var(--surface-light); stroke: var(--accent); stroke-width: 1.5; }
        .node-text { fill: var(--text); font-size: 8px; font-family: monospace; text-anchor: middle; }
        .node-link { stroke: var(--text-dim); stroke-width: 1; stroke-dasharray: 2; opacity: 0.5; }
        .node-label { fill: var(--warning); font-size: 7px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>⚡ WEB PAGE TEXT COMPRESSOR <span style="color: var(--text-dim); font-weight: 400; font-size: 0.7rem; margin-left: 10px;">HYBRID PIPELINE v2.0</span></h1>
        <div class="pipeline-status">
            <label class="toggle-container" style="background: var(--surface-light); padding: 0.4rem 0.8rem; border-radius: 0.4rem; border: 1px solid #374151; color: var(--accent); cursor: pointer; font-weight: 600;">
                <input type="file" id="file-input" style="display: none;">
                <span>📂 LOAD FILE</span>
            </label>
            <label class="toggle-container">
                <input type="checkbox" id="static-dict-toggle" checked>
                <span>Pre-loaded HTML Dictionary</span>
            </label>
            <div id="final-savings" class="stat-value" style="color: var(--success); font-size: 1rem;">SAVINGS: 0%</div>
        </div>
    </header>

    <main id="main-container">
        <section class="editor-container">
            <textarea id="input" spellcheck="false"></textarea>
        </section>

        <div id="main-splitter"></div>

        <aside class="sidebar">
            <div class="sidebar-section collapsed" style="height: 120px;">
                <div class="stat-group">
                    <div class="stat-card" style="display: flex; flex-direction: column; justify-content: center;">
                        <div class="stat-label collapsed">Entropy (H)</div>
                        <div id="entropy-val" class="stat-value" style="color: var(--accent);">0.00</div>
                        <div class="stat-sub">bits / symbol</div>
                    </div>
                    <div class="stat-card" style="display: flex; flex-direction: column; justify-content: center;">
                        <div class="stat-label collapsed">Efficiency</div>
                        <div id="bits-per-sym" class="stat-value" style="color: var(--success);">0.00</div>
                        <div class="stat-sub">bits / sym</div>
                    </div>
                </div>
            </div>

            <div class="resizer-v"></div>

            <div class="sidebar-section collapsed" style="height: 160px;">
                <div class="stat-card">
                    <div class="stat-label collapsed">Pipeline Metrics</div>
                    <div style="font-size: 0.85rem; display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.5rem;">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-dim);">Original:</span> <span id="size-orig">0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-dim);">LZW Stage:</span> <span id="size-lzw">0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; color: var(--success); font-weight: 700;">
                            <span>Hybrid (LZW+Huff):</span> <span id="size-hybrid">0</span>
                        </div>
                    </div>
                    <div class="progress-indicator" style="margin-top: 1rem;"><div id="size-progress" class="progress-fill"></div></div>
                </div>
            </div>

            <div class="resizer-v"></div>

            <div class="sidebar-section collapsed" style="height: 300px;">
                <div class="stat-label collapsed" style="margin-bottom: 0.6rem; padding-left: 0.5rem;">Active Dictionary</div>
                <div id="dictionary-viz" class="viz-box"></div>
                <div id="dict-controls" style="display: flex; gap: 0.5rem; margin-top: 0.8rem; padding: 0 0.25rem;">
                    <button id="load-more-btn" style="flex:1; font-size: 0.7rem; background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); color: var(--accent);">Load More</button>
                    <button id="show-all-btn" style="font-size: 0.7rem; background: transparent;">All</button>
                </div>
            </div>

            <div class="resizer-v"></div>

            <div class="sidebar-section" style="flex: 1; min-height: 150px;">
                <div class="stat-label" style="margin-bottom: 0.6rem; padding-left: 0.5rem;">Symbol Frequencies (Huffman Pass)</div>
                <div id="freq-viz" class="viz-box"></div>
            </div>

            <div class="resizer-v"></div>

            <div class="sidebar-section" style="flex: 1.5; min-height: 350px;">
                <div class="stat-label" style="margin-bottom: 0.6rem; padding-left: 0.5rem;">Visual Huffman Tree</div>
                <div class="viz-box" style="padding: 0; overflow: hidden; position: relative; height: 100%;">
                    <svg id="huffman-tree-svg" style="width:100%; height:100%"></svg>
                </div>
            </div>
        </aside>
    </main>

    <script>
        /**
         * GLOBAL CONSTANTS
         * These are the "Common Tags" we pre-load to make the compressor smarter.
         */
        const HTML_TOKENS = [
            "<div>", "</div>", "<span>", "</span>", "<p>", "</p>", "class=\"", "id=\"", "style=\"", "href=\"", 
            "src=\"", "<html>", "</html>", "<head>", "</head>", "<body>", "</body>", "<li>", "</li>", "<ul>", 
            "</ul>", "<table>", "</table>", "<tr>", "</tr>", "<td>", "</td>", "<img>", "<a>", "</a>", "DOCTYPE html", "UTF-8"
        ];

        // This object stores the current state of the application
        let appState = {
            allLearnedEntries: [], 
            displayLimit: 20     
        };

        // Cache the HTML elements
        const els = {
            input: document.getElementById('input'),
            entropy: document.getElementById('entropy-val'),
            bitsPerSym: document.getElementById('bits-per-sym'),
            sizeOrig: document.getElementById('size-orig'),
            sizeLzw: document.getElementById('size-lzw'),
            sizeHybrid: document.getElementById('size-hybrid'),
            sizeProgress: document.getElementById('size-progress'),
            savings: document.getElementById('final-savings'),
            dictViz: document.getElementById('dictionary-viz'),
            freqViz: document.getElementById('freq-viz'),
            toggleStatic: document.getElementById('static-dict-toggle'),
            loadMoreBtn: document.getElementById('load-more-btn'),
            fileInput: document.getElementById('file-input')
        };

        /**
         * SHANNON ENTROPY CALCULATION
         * This function calculates the "Complexity" or "Uncertainty" of the data.
         * Math: H(X) = -Sum( P(i) * log2( P(i) ) )
         */
        function calculateEntropy(str) {
            // If the input is empty, entropy is zero.
            if (!str) return 0;
            
            const freq = {};
            // 1. We count how many times every character appears (Frequency)
            for (let char of str) freq[char] = (freq[char] || 0) + 1;
            
            let entropy = 0;
            for (let char in freq) {
                // 2. We calculate the Probability (P) of each character
                const p = freq[char] / str.length;
                
                // 3. We apply the Shannon formula to get the bit-value of the character.
                // Rare characters (low P) give higher entropy (more "surprise").
                entropy -= p * Math.log2(p);
            }
            return entropy;
        }

        /**
         * DICTIONARY INITIALIZATION
         * This creates the starting "Book of Patterns".
         */
        function getInitialDict(useStatic) {
            let dict = {};
            // Start with standard ASCII (0 to 255)
            for (let i = 0; i < 256; i++) dict[String.fromCharCode(i)] = i;
            
            // If the user checked the "Static" box, add our HTML tags too
            if (useStatic) {
                HTML_TOKENS.forEach((t, i) => { dict[t] = 256 + i; });
            }
            return dict;
        }

        /**
         * LZW (LEMPEL-ZIV-WELCH) ENCODING
         * This is the heart of the compressor. It turns patterns into numbers.
         */
        function lzwEncode(data, useStatic) {
            // Start with the basic dictionary (ASCII + optional HTML tags)
            let dict = getInitialDict(useStatic);
            let dictSize = Object.keys(dict).length;
            
            let curr = "";
            let result = [];
            let learned = [];

            // We loop through every character in the source text.
            for (let char of data) {
                // We combine the 'current' pattern with the 'next' character.
                let combined = curr + char;
                
                // If we HAVE seen this combination before...
                if (dict.hasOwnProperty(combined)) {
                    // ...don't output anything. Keep building a longer pattern!
                    curr = combined;
                } else {
                    // Mismatch! We have NOT seen 'combined' before.
                    // So we output the index of the part we DO know ('curr').
                    result.push(dict[curr]);
                    
                    // Now we "Learn": Add the new 'combined' pattern to the dictionary.
                    dict[combined] = dictSize++;
                    
                    // NO LIMIT: We now record everything
                    learned.push({ key: combined, val: dictSize - 1 });
                    
                    // Reset 'curr' to start a new search beginning with the character that failed.
                    curr = char;
                }
            }
            // Output the final pattern that was being built.
            if (curr !== "") result.push(dict[curr]);
            return { codes: result, entries: learned, finalDictSize: dictSize };
        }

        /**
         * HUFFMAN TREE CONSTRUCTION
         */
        function buildHuffmanTree(freqMap) {
            const nodes = Object.entries(freqMap).map(([id, freq]) => ({
                id,
                freq,
                left: null,
                right: null,
                isLeaf: true
            }));

            if (nodes.length === 0) return null;

            while (nodes.length > 1) {
                nodes.sort((a, b) => a.freq - b.freq);
                const left = nodes.shift();
                const right = nodes.shift();
                const parent = {
                    id: null,
                    freq: left.freq + right.freq,
                    left,
                    right,
                    isLeaf: false
                };
                nodes.push(parent);
            }
            return nodes[0];
        }

        function generateHuffmanCodes(node, prefix = "", codes = {}) {
            if (!node) return codes;
            if (node.isLeaf) {
                codes[node.id] = prefix || "0";
            } else {
                generateHuffmanCodes(node.left, prefix + "0", codes);
                generateHuffmanCodes(node.right, prefix + "1", codes);
            }
            return codes;
        }

        /**
         * THE HYBRID PASS (Statistical Optimization)
         */
        function calculateHybridBitCost(indices) {
            if (!indices.length) return { totalBits: 0, freqMap: {}, tree: null, huffCodes: {} };
            
            const freq = {};
            indices.forEach(idx => freq[idx] = (freq[idx] || 0) + 1);
            
            const tree = buildHuffmanTree(freq);
            const huffCodes = generateHuffmanCodes(tree);
            
            let totalBits = 0;
            indices.forEach(idx => {
                totalBits += huffCodes[idx].length;
            });
            
            return { totalBits, freqMap: freq, tree, huffCodes };
        }

        /**
         * DICTIONARY RENDERING (Pagination & Optimization)
         * This displays the patterns the engine has learned.
         * Optimized for large inputs using string batching to avoid DOM thrashing.
         */
        function renderDictionary() {
            const list = appState.allLearnedEntries.slice(0, appState.displayLimit);
            
            // Optimization: Building a single large string is faster than multiple DOM insertions
            let html = "";
            for (let i = 0; i < list.length; i++) {
                const e = list[i];
                html += `
                    <div class="dict-entry">
                        <span class="dict-key">${e.key.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span> 
                        <span class="dict-val">#${e.val}</span>
                    </div>`;
            }
            els.dictViz.innerHTML = html;
            
            const remaining = appState.allLearnedEntries.length - appState.displayLimit;
            if (remaining > 0) {
                els.loadMoreBtn.innerText = `Load Next 50 (${remaining} left)`;
                els.loadMoreBtn.style.opacity = "1";
            } else {
                els.loadMoreBtn.innerText = "All Patterns Loaded";
                els.loadMoreBtn.style.opacity = "0.5";
            }
        }

        /**
         * SVG TREE RENDERER (Performance Optimized)
         * Renders the Huffman tree as an SVG.
         * To prevent lag on huge inputs, we only visualize the top 25 most frequent symbols.
         */
        function renderHuffmanTree(fullRoot, freqMap) {
            const svg = document.getElementById('huffman-tree-svg');
            svg.innerHTML = '';
            if (!fullRoot) return;

            // PERFORMANCE SHIELD: If there are too many symbols, the tree becomes unreadable and slow.
            // We rebuild a smaller "Visual Tree" for the top 25 symbols to keep the UI snappy.
            const sortedEntries = Object.entries(freqMap).sort((a,b) => b[1] - a[1]).slice(0, 25);
            const limitedFreqMap = Object.fromEntries(sortedEntries);
            const visualRoot = buildHuffmanTree(limitedFreqMap);

            const width = svg.clientWidth || 400;
            const height = svg.clientHeight || 350;
            const margin = { top: 40, right: 30, bottom: 20, left: 30 };
            
            let svgContent = "";

            function getDepth(node) {
                if (!node) return 0;
                return 1 + Math.max(getDepth(node.left), getDepth(node.right));
            }

            const maxDepth = getDepth(visualRoot);
            const levelHeight = (height - margin.top - margin.bottom) / (maxDepth || 1);

            function generateNodeMarkup(node, x, y, xRange, depth) {
                if (!node) return;

                // Draw links (Lines)
                if (node.left) {
                    const nextX = x - xRange / 4;
                    const nextY = y + levelHeight;
                    svgContent += `<line x1="${x}" y1="${y}" x2="${nextX}" y2="${nextY}" class="node-link" />`;
                    svgContent += `<text x="${(x + nextX) / 2 - 5}" y="${(y + nextY) / 2}" class="node-label">0</text>`;
                    generateNodeMarkup(node.left, nextX, nextY, xRange / 2, depth + 1);
                }

                if (node.right) {
                    const nextX = x + xRange / 4;
                    const nextY = y + levelHeight;
                    generateNodeMarkup(node.right, nextX, nextY, xRange / 2, depth + 1);
                }

                // Draw Node (Circle)
                const radius = node.isLeaf ? 14 : 8;
                const opacity = node.isLeaf ? 1 : 0.5;
                svgContent += `<circle cx="${x}" cy="${y}" r="${radius}" class="node-circle" style="opacity: ${opacity}" />`;

                // Draw ID or Frequency (Text)
                const label = node.isLeaf ? `#${node.id}` : node.freq;
                svgContent += `<text x="${x}" y="${y + 3}" class="node-text">${label}</text>`;
            }

            generateNodeMarkup(visualRoot, width / 2, margin.top, width - margin.left - margin.right, 0);
            svg.innerHTML = svgContent;
        }

        /**
         * THE UI UPDATE LOOP
         * This runs the whole pipeline and updates the screen.
         */
        function updateUI() {
            const val = els.input.value;
            const useStatic = els.toggleStatic.checked;
            
            if (!val) return;

            // ... (Entropy and Size math same as before) ...
            const entropy = calculateEntropy(val);
            els.entropy.innerText = entropy.toFixed(3);
            const origBytes = new Blob([val]).size;
            els.sizeOrig.innerText = `${origBytes} B`;

            // 3. Run LZW Encoding
            const { codes, entries } = lzwEncode(val, useStatic);
            
            // 4. Update the state for rendering
            appState.allLearnedEntries = entries;
            
            // ... (Rest of size math) ...
            const lzwBytes = Math.ceil(codes.length * 1.5);
            els.sizeLzw.innerText = `${lzwBytes} B`;
            const { totalBits, freqMap, tree, huffCodes } = calculateHybridBitCost(codes);
            const hybridBytes = Math.ceil(totalBits / 8);
            els.sizeHybrid.innerText = `${hybridBytes} B`;
            const finalBitsPerSym = totalBits / val.length;
            els.bitsPerSym.innerText = finalBitsPerSym.toFixed(3);
            const savings = ((1 - (hybridBytes / origBytes)) * 100).toFixed(1);
            els.savings.innerText = `SAVINGS: ${savings}%`;
            els.sizeProgress.style.width = `${Math.min(100, (hybridBytes / origBytes) * 100)}%`;

            // 8. Render the dictionary list (using the optimized paginated function)
            renderDictionary();

            // 9. Render the Huffman Tree (Optimized for top symbols)
            renderHuffmanTree(tree, freqMap);

            const sortedFreq = Object.entries(freqMap).sort((a,b) => b[1] - a[1]).slice(0, 10);
            els.freqViz.innerHTML = sortedFreq.map(([idx, count]) => `
                <div class="dict-entry">
                    <span class="dict-key">Code #${idx}</span> 
                    <span class="dict-val" style="color:var(--text-dim)">${count} hits</span>
                    <span class="dict-val" style="color:var(--warning); font-size: 0.65rem; margin-left: 10px;">bits: ${huffCodes[idx]}</span>
                </div>
            `).join('');
        }

        // --- DICTIONARY CONTROLLERS ---
        els.loadMoreBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent collapsing the panel when clicking buttons
            appState.displayLimit += 50;
            renderDictionary();
        });

        document.getElementById('show-all-btn').addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent collapsing
            const count = appState.allLearnedEntries.length;
            if (count > 1000 && !confirm(`Displaying ${count} entries might lag your browser. Proceed?`)) return;
            appState.displayLimit = count;
            renderDictionary();
        });

        // --- COLLAPSIBLE PANELS ---
        document.querySelectorAll('.stat-label').forEach(label => {
            label.addEventListener('click', () => {
                const section = label.closest('.sidebar-section');
                if (section) {
                    section.classList.add('animating');
                    section.classList.toggle('collapsed');
                    label.classList.toggle('collapsed');
                    
                    // Clean up class after animation finishes
                    setTimeout(() => section.classList.remove('animating'), 350);
                }
            });
        });


        // --- EVENT LISTENERS ---

        let debounceTimer;
        els.input.addEventListener('input', () => {
            // PERFORMANCE SHIELD: Prevents the app from hanging on large inputs
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                updateUI();
            }, 150); 
        });

        els.toggleStatic.addEventListener('change', updateUI);

        // --- FILE LOADING LOGIC ---
        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                els.input.value = event.target.result;
                updateUI();
            };
            reader.readAsText(file);
        });

        // Initial Data for the first load
        els.input.value = `<!DOCTYPE html>\n<html>\n  <head>\n    <title>Pro Demo</title>\n  </head>\n  <body class="main-layout">\n    <div class="content-box">\n      <h1>Web Compression v2.0</h1>\n      <div class="content-box">The repetitive class="main-layout" is easily indexed.</div>\n    </div>\n  </body>\n</html>`;
        updateUI();
        // --- HORIZONTAL RESIZER LOGIC ---
        const splitter = document.getElementById('main-splitter');
        const container = document.getElementById('main-container');
        let isDragging = false;

        splitter.addEventListener('mousedown', (e) => {
            isDragging = true;
            splitter.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            // Disable text selection while dragging
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const containerWidth = container.offsetWidth;
            const mouseX = e.clientX;
            
            // Calculate new percentage for the first column (Editor)
            // We keep the splitter at 6px and adjust the sidebar width
            const sidebarWidth = containerWidth - mouseX;
            if (sidebarWidth > 200 && sidebarWidth < 800) {
                container.style.gridTemplateColumns = `1fr 6px ${sidebarWidth}px`;
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                splitter.classList.remove('dragging');
                document.body.style.cursor = 'default';
                document.body.style.userSelect = 'auto';
            }
        });
        // --- VERTICAL RESIZER LOGIC ---
        document.querySelectorAll('.resizer-v').forEach(vSplitter => {
            let isDraggingV = false;
            vSplitter.addEventListener('mousedown', (e) => {
                isDraggingV = true;
                vSplitter.classList.add('dragging');
                document.body.style.cursor = 'row-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDraggingV) return;
                const prevSection = vSplitter.previousElementSibling;
                const nextSection = vSplitter.nextElementSibling;
                
                if (prevSection && nextSection) {
                    const rect = prevSection.getBoundingClientRect();
                    const newHeight = e.clientY - rect.top;
                    if (newHeight > 50 && newHeight < 600) {
                        prevSection.style.height = `${newHeight}px`;
                        prevSection.style.flex = "none"; // Stop flex from fighting the height
                    }
                }
            });

            document.addEventListener('mouseup', () => {
                if (isDraggingV) {
                    isDraggingV = false;
                    vSplitter.classList.remove('dragging');
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = 'auto';
                }
            });
        });
    </script>
</body>
</html>
